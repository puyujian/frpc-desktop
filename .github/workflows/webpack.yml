name: NodeJS with Webpack

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      max-parallel: 2
      matrix:
        node-version: [22.12.0]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Normalize lockfile sources for CI
        run: |
          node scripts/normalize-lockfile-sources.cjs

      - name: Validate lockfile sources for CI
        run: |
          node scripts/normalize-lockfile-sources.cjs --check

      - name: Install dependencies
        env:
          npm_config_registry: https://registry.npmjs.org/
          npm_config_fetch_retries: 5
          npm_config_fetch_retry_factor: 2
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000
          npm_config_fetch_timeout: 300000
          npm_config_audit: "false"
          npm_config_fund: "false"
          npm_config_electron_mirror: https://github.com/electron/electron/releases/download/
        run: |
          npm ci

      - name: Build Window (no publish)
        if: ${{ matrix.os == 'windows-latest' && github.event_name == 'pull_request' }}
        run: |
          npm run build:electron:win

      - name: Release Window
        if: ${{ matrix.os == 'windows-latest' && github.event_name == 'push' }}
        run: |
          npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Build MacOS (no publish)
        if: ${{ matrix.os == 'macos-latest' && github.event_name == 'pull_request' }}
        run: |
          npm run build:electron:mac

      - name: Release MacOS
        if: ${{ matrix.os == 'macos-latest' && github.event_name == 'push' }}
        run: |
          npm run release:mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Build Linux (no publish)
        if: ${{ matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request' }}
        run: |
          npm run build:electron:linux

      - name: Release Linux
        if: ${{ matrix.os == 'ubuntu-latest' && github.event_name == 'push' }}
        run: |
          npm run release:linux
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
